name: vprofile actions
on: workflow_dispatch
env:
    AWS_REGION: us-east-1
    ECR_REPOSITORY: vprofileapp
    EKS_CLUSTER: vprofile-eks-cluster

jobs:
    Testing: 
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Maven test
          run: mvn test
        
        - name: Checkstyle
          run: mvn checkstyle:checkstyle

        # Setup java 11 to be default (sonar-scanner requiement as of 5.x)
        - name: Setup Java 11
          uses: actions/setup-java@v3
          with:
            java-version: '11'
            distribution: 'temurin' # see 'Supported distributions and versions' for more options

        - name: Setup SonarQube
          uses: warchant/setup-sonar-scanner@v7

        - name: SonaQube Scan
          run: sonar-scanner
            -Dsonar.host.url=${{ secrets.SONAR_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/
            -Dsonar.junit.reporstsPath=target/surefire-reports/
            -Dsonar.jcoco.reportsPath=target/jacoco.exec
            -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
            -Dsonar.java.binaries=target/test-classes/com/visualpathit/accountservice/impl/AccountServiceImpl.class

        #Check the quality gate status
        - name: SonarQube Quality Gate Check
          id: sonarqube-quality-gate-cheeck
          uses: sonarsource/sonarqube-quality-gate-action@master
          timeout-minutes: 5
          env:
            SONAR_HOST_URL: ${{ secrets.SONAR_URL }}  #Optional if already set in previous step
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
            